services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # SQLite DB stored in the persistent volume
      - DATABASE_URL=file:/app/data/galizano.db
    volumes:
      # Persist SQLite database
      - db-data:/app/data
      # Persist user uploads
      - uploads:/app/public/uploads

volumes:
  db-data:
  uploads:
